        <!-- Splash screen style while JS loads -->

            #splash-screen {
                position: fixed; inset: 0; z-index: 9999;
                background: #E0E5EC;
                display: flex; flex-direction: column;
                align-items: center; justify-content: center;
                transition: opacity 0.3s ease;
            }
            @media (prefers-color-scheme: dark) {
                #splash-screen { background: #121212; }
                #splash-screen p { color: #A0AEC0; }
            }
            #splash-screen img { width: 80px; height: 80px; border-radius: 16px; }
            #splash-screen p { margin-top: 12px; font-family: sans-serif; font-size: 14px; color: #718096; }
            #splash-screen .loader { width: 24px; height: 24px; margin-top: 16px; border: 3px solid #E0E5EC; border-top-color: #CF2030; border-radius: 50%; animation: spin 0.8s linear infinite; }
            @media (prefers-color-scheme: dark) { #splash-screen .loader { border-color: #333; border-top-color: #CF2030; } }
            @keyframes spin { to { transform: rotate(360deg); } }

        <div id="root"></div>

        <!-- Auto-remove splash screen once React bundle loads -->
        <script>
            (function removeSplash() {
                // MutationObserver: remove splash once React renders content into #root
                var root = document.getElementById('root');
                var splash = document.getElementById('splash-screen');
                if (!splash) return;
                var observer = new MutationObserver(function() {
                    if (root.children.length > 0) {
                        observer.disconnect();
                        splash.style.opacity = '0';
                        setTimeout(function() { if (splash.parentNode) splash.parentNode.removeChild(splash); }, 350);
                    }
                });
                observer.observe(root, { childList: true });
                // Fallback: remove after 5s no matter what
                setTimeout(function() {
                    observer.disconnect();
                    if (splash.parentNode) { splash.style.opacity = '0'; setTimeout(function() { if (splash.parentNode) splash.parentNode.removeChild(splash); }, 350); }
                }, 5000);
            })();
        </script>
