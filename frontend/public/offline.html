<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#CF2030" />
  <title>AasaanApp - Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #E0E5EC;
      color: #2D3748;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #121212; color: #E2E8F0; }
      .card { background: #1A1A2E; box-shadow: 6px 6px 12px rgba(0,0,0,0.7), -6px -6px 12px rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.06); }
      .btn { background: #1A1A2E; color: #E2E8F0; box-shadow: 4px 4px 8px rgba(0,0,0,0.7), -4px -4px 8px rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.06); }
      .btn:active { box-shadow: inset 2px 2px 5px rgba(0,0,0,0.7), inset -2px -2px 5px rgba(255,255,255,0.05); }
    }
    .card {
      background: #E0E5EC;
      box-shadow: 6px 6px 12px rgba(163,177,198,0.6), -6px -6px 12px rgba(255,255,255,0.8);
      border: 1px solid rgba(163,177,198,0.25);
      border-radius: 16px;
      padding: 40px 24px;
      max-width: 380px;
      width: 100%;
    }
    .logo { width: 80px; height: 80px; border-radius: 16px; margin: 0 auto 16px; }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 8px; color: #CF2030; }
    p { font-size: 15px; color: #718096; margin-bottom: 24px; line-height: 1.5; }
    .icon { font-size: 48px; margin-bottom: 16px; }
    .btn {
      display: inline-block;
      padding: 14px 32px;
      background: #E0E5EC;
      color: #2D3748;
      border: 1px solid rgba(163,177,198,0.25);
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 4px 4px 8px rgba(163,177,198,0.6), -4px -4px 8px rgba(255,255,255,0.8);
      transition: box-shadow 150ms, transform 100ms;
      text-decoration: none;
      min-height: 48px;
    }
    .btn:active {
      box-shadow: inset 2px 2px 5px rgba(163,177,198,0.6), inset -2px -2px 5px rgba(255,255,255,0.8);
      transform: scale(0.98);
    }
  </style>
</head>
<body>
  <div class="card">
    <img src="/icons/icon-192x192.png" alt="AasaanApp" class="logo" onerror="this.style.display='none'" />
    <div class="icon">📡</div>
    <h1>You're Offline</h1>
    <p>Please check your internet connection and try again.</p>
    <button class="btn" onclick="window.location.reload()">Retry</button>
  </div>
</body>
</html>
